services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    # ENTRYPOINT is baked into the image at /app/scripts/entrypoint.sh
    # No need to override entrypoint: here — Dockerfile already sets it
    command: ["gunicorn", "-c", "config/gunicorn.conf.py", "config.wsgi:application"]
    volumes:
      - /srv/aurora/shared/static:/app/staticfiles
      - /srv/aurora/shared/media:/app/media
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RUN_MIGRATIONS=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fL", "http://localhost:8000/health/server"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  celery_worker:
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - /srv/aurora/shared/media:/app/media
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # RUN_MIGRATIONS intentionally omitted — worker skips migrate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery_beat:
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    command: ["celery", "-A", "config", "beat", "--loglevel=info"]
    volumes:
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # RUN_MIGRATIONS intentionally omitted — beat skips migrate
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: ghcr.io/sukumarsatpathy/aurorablings/frontend:latest
    restart: always
    depends_on:
      backend:
        condition: service_healthy

  nginx_proxy:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/aurora/current/deploy/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/aurora/shared/certbot/www:/var/www/certbot
      - /srv/aurora/shared/certbot/conf:/etc/letsencrypt
      - /srv/aurora/shared/static:/app/staticfiles:ro
      - /srv/aurora/shared/media:/app/media:ro
      - /srv/aurora/shared/logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
    external: true
    name: aurora_postgres_data

networks:
  default:
    external: true
    name: aurora_network