services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 config.wsgi:application
    volumes:
      - /srv/aurora/shared/static:/app/staticfiles
      - /srv/aurora/shared/media:/app/media
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/server"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    # Replaces 'build' with the pre-built backend image
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    command: celery -A config worker --loglevel=info
    volumes:
      - /srv/aurora/shared/media:/app/media
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    # Replaces 'build' with the pre-built backend image
    image: ghcr.io/sukumarsatpathy/aurorablings/backend:latest
    restart: always
    command: celery -A config beat --loglevel=info
    volumes:
      - /srv/aurora/shared/logs:/app/logs
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE=postgres
      - SQL_HOST=db
      - SQL_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    # Replaces 'build' with your pre-built frontend image
    image: ghcr.io/sukumarsatpathy/aurorablings/frontend:latest
    restart: always
    depends_on:
      - backend

  nginx_proxy:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/aurora/current/deploy/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/aurora/shared/certbot/www:/var/www/certbot
      - /srv/aurora/shared/certbot/conf:/etc/letsencrypt
      - /srv/aurora/shared/static:/app/staticfiles:ro
      - /srv/aurora/shared/media:/app/media:ro
      - /srv/aurora/shared/logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
