<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload the hero image first: it is the LCP element on the landing
         page. This previously sat below a ~130-line parser-blocking inline
         script, so the browser could not start fetching it until that
         script had been downloaded, parsed and executed. -->
    <link rel="preload" as="image" href="/media/banner-1200.webp" fetchpriority="high" />

    <!-- The GTM bootstrap that used to live here has been removed. It ran a
         duplicate fetch of /api/v1/features/public-settings/ (main.tsx makes
         the same call) and blocked the parser on the critical path.
         GTM is now loaded from src/main.tsx during browser idle time. -->
    <link rel="icon" href="data:," />
    <meta
      name="description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aurora Blings" />
    <meta property="og:title" content="Aurora Blings" />
    <meta
      property="og:description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aurora Blings" />
    <meta
      name="twitter:description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <title>Aurora Blings</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
