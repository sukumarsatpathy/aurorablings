<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- NO hero preload here, deliberately. Do not add one back without reading this.
         There used to be:
           <link rel="preload" as="image" href="/media/banner-1200.webp" fetchpriority="high" />
         That was wrong on two counts. banner-1200.webp is only the *fallback*
         image inside DualPromoBanner, which is lazy-imported and sits below the
         deals section on the homepage — it is not the LCP element. And this tag
         is in the shared shell, so every route paid for a high-priority download
         of an off-screen image that competed with the real LCP request.
         The actual LCP element is the first PromoBannerCard, whose URL comes
         from the banners API and is therefore not knowable at build time. It is
         prioritised at the element instead, via priority on OptimizedImage
         (loading=eager + fetchpriority=high). See PromoBannerGrid.jsx. -->
    <!-- The GTM bootstrap that used to live here has been removed. It ran a
         duplicate fetch of /api/v1/features/public-settings/ (main.tsx makes
         the same call) and blocked the parser on the critical path.
         GTM is now loaded from src/main.tsx during browser idle time. -->
    <link rel="icon" href="data:," />
    <meta
      name="description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Aurora Blings" />
    <meta property="og:title" content="Aurora Blings" />
    <meta
      property="og:description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aurora Blings" />
    <meta
      name="twitter:description"
      content="Aurora Blings brings stylish, premium accessories and standout picks for every occasion."
    />
    <title>Aurora Blings</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
