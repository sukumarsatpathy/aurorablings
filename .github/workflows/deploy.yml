name: Aurora Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: aurorablings-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    # FIX 1: Add services so Django tests have a real DB + cache
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora_user
          POSTGRES_PASSWORD: aurora_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # FIX 2: Set DJANGO_SETTINGS_MODULE + test DB env vars
      - name: Run backend tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-only-secret-key-not-used-in-prod
          DATABASE_URL: postgres://aurora_user:aurora_pass@localhost:5432/aurora_test
          REDIS_URL: redis://localhost:6379/0
          SQL_HOST: localhost
          SQL_PORT: 5432
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora_user
          POSTGRES_PASSWORD: aurora_pass
        run: python manage.py test --noinput --verbosity=2

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build release id
        id: release
        run: echo "release_id=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        run: |
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='backend/__pycache__' \
            --exclude='backend/.pytest_cache' \
            -czf aurorablings-release.tgz \
            backend \
            frontend \
            deploy \
            docker-compose.prod.yml \
            .env.example

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurorablings-release-${{ steps.release.outputs.release_id }}
          path: aurorablings-release.tgz
          retention-days: 7

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build-test-package
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: aurorablings-release-${{ needs.build-test-package.outputs.release_id }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp aurorablings-release.tgz \
            "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/aurorablings-release-${{ needs.build-test-package.outputs.release_id }}.tgz"

      - name: Deploy release
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
            APP_ROOT='${{ secrets.STAGING_APP_ROOT }}' \
            RELEASE_ID='${{ needs.build-test-package.outputs.release_id }}' \
            ARTIFACT_PATH='/tmp/aurorablings-release-${{ needs.build-test-package.outputs.release_id }}.tgz' \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          mkdir -p "${APP_ROOT}"
          TMP_DEPLOY_DIR="$(mktemp -d)"
          tar -xzf "${ARTIFACT_PATH}" -C "${TMP_DEPLOY_DIR}"
          bash "${TMP_DEPLOY_DIR}/deploy/scripts/deploy_release.sh" \
            --app-root "${APP_ROOT}" \
            --release-id "${RELEASE_ID}" \
            --artifact "${ARTIFACT_PATH}" \
            --keep-releases 3
          rm -rf "${TMP_DEPLOY_DIR}"
          # FIX 3: Clean up uploaded tarball after deploy
          rm -f "${ARTIFACT_PATH}" REMOTE

      # FIX 4: Health check after deploy
      - name: Health check (staging)
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "${{ secrets.STAGING_WEB_BASE_URL }}/health/server")
          if [ "$STATUS" != "200" ]; then
            echo "Staging health check failed! HTTP $STATUS"
            exit 1
          fi
          echo "Staging health check passed (HTTP $STATUS)"

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: build-test-package
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: aurorablings-release-${{ needs.build-test-package.outputs.release_id }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp aurorablings-release.tgz \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/aurorablings-release-${{ needs.build-test-package.outputs.release_id }}.tgz"

      - name: Deploy release
        run: |
          ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            APP_ROOT='${{ secrets.PROD_APP_ROOT }}' \
            RELEASE_ID='${{ needs.build-test-package.outputs.release_id }}' \
            ARTIFACT_PATH='/tmp/aurorablings-release-${{ needs.build-test-package.outputs.release_id }}.tgz' \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          mkdir -p "${APP_ROOT}"
          TMP_DEPLOY_DIR="$(mktemp -d)"
          tar -xzf "${ARTIFACT_PATH}" -C "${TMP_DEPLOY_DIR}"
          bash "${TMP_DEPLOY_DIR}/deploy/scripts/deploy_release.sh" \
            --app-root "${APP_ROOT}" \
            --release-id "${RELEASE_ID}" \
            --artifact "${ARTIFACT_PATH}" \
            --keep-releases 3
          rm -rf "${TMP_DEPLOY_DIR}"
          # FIX 3: Clean up uploaded tarball after deploy
          rm -f "${ARTIFACT_PATH}"
REMOTE

      # FIX 4: Health check after deploy
      - name: Health check (production)
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 "https://aurorablings.com/health/server")
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed! HTTP $STATUS"
            exit 1
          fi
          echo "Production health check passed (HTTP $STATUS)"