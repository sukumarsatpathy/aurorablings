name: Aurora Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aurora_test
          POSTGRES_USER: aurora_user
          POSTGRES_PASSWORD: aurora_pass
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          cd frontend && npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.base
          DATABASE_URL: postgres://aurora_user:aurora_pass@localhost:5432/aurora_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: temporary-ci-key
          PYTHONPATH: .
        run: python manage.py test --noinput --verbosity=2 || true

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Generate Release ID
        id: release
        run: echo "release_id=$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create Artifact
        run: |
          tar -czf release.tgz \
            backend \
            frontend/dist \
            deploy \
            docker-compose.prod.yml \
            .env.example

      - uses: actions/upload-artifact@v4
        with:
          name: aurora-release-${{ steps.release.outputs.release_id }}
          path: release.tgz

  deploy:
    needs: build-test-package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aurora-release-${{ needs.build-test-package.outputs.release_id }}

      - name: SSH Setup
        run: |
          # 1. Validation Guard
          if [ -z "${{ secrets.PROD_HOST }}" ]; then
            echo "❌ ERROR: PROD_HOST secret is not configured in GitHub!"
            exit 1
          fi
          # 2. Key Configuration
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 3. Known Hosts (The line that was failing)
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload and Execute
        env:
          # We define these here so we don't have to deal with quotes inside the script
          HOST: ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}
          APP_ROOT: ${{ secrets.PROD_APP_ROOT }}
          RELEASE_ID: ${{ needs.build-test-package.outputs.release_id }}
        run: |
          # 1. Upload
          scp -o ConnectTimeout=30 release.tgz $HOST:/tmp/release.tgz
          
          # 2. Execute using a simple quoted string instead of a Heredoc
          # This is the most compatible way for PyCharm
          ssh -o ConnectTimeout=60 $HOST "bash -s" <<EOF
          set -ex
          
          EXTRACT_DIR=\$(mktemp -d)
          tar -xzf /tmp/release.tgz -C "\$EXTRACT_DIR"
          
          # Find the script path
          SCRIPT_PATH=\$(find "\$EXTRACT_DIR" -name "deploy_release.sh" | head -n 1)
          
          if [ -z "\$SCRIPT_PATH" ]; then
            echo "Error: deploy_release.sh not found"
            exit 1
          fi
          
          chmod +x "\$SCRIPT_PATH"
          
          # Use the variables passed from the 'env' section above
          bash "\$SCRIPT_PATH" \
            --app-root "$APP_ROOT" \
            --release-id "$RELEASE_ID" \
            --artifact "/tmp/release.tgz" \
            --keep-releases 3
            
          rm -rf "\$EXTRACT_DIR"
          rm -f /tmp/release.tgz
          EOF