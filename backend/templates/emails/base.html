<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ email_title|default:"Aurora Blings" }}</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f8f5;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8f5;padding:24px 10px;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="max-width:640px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr>
              <td style="padding:22px 26px;background:#517b4b;color:#ffffff;">
                <h1 style="margin:0;font-size:22px;">Aurora Blings</h1>
                <p style="margin:8px 0 0;font-size:13px;opacity:.9;">Premium imitation jewelry crafted for everyday elegance.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:26px;">
                {% block email_content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 26px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;">
                Need help? Reach us at {{ support_email|default:"connect@aurorablings.com" }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
