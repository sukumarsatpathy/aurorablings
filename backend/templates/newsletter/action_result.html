<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
  </head>
  <body style="margin:0;background:#f5f8f2;font-family:Inter,Arial,sans-serif;color:#22311f;">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
      <div style="width:100%;max-width:560px;background:#ffffff;border:1px solid #dbe5d5;border-radius:28px;padding:36px;box-shadow:0 24px 80px rgba(81,123,75,0.08);">
        <p style="margin:0 0 12px;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:{% if tone == 'error' %}#9a4337{% else %}#517b4b{% endif %};font-weight:700;">
          Aurora Blings
        </p>
        <h1 style="margin:0 0 14px;font-size:32px;line-height:1.15;">{{ title }}</h1>
        <p style="margin:0 0 24px;font-size:15px;line-height:1.8;color:#556553;">{{ message }}</p>
        <a href="{{ shop_url }}" style="display:inline-block;padding:13px 24px;background:#517b4b;color:#ffffff;text-decoration:none;border-radius:999px;font-weight:700;">
          Continue to Aurora Blings
        </a>
        <p style="margin:24px 0 0;font-size:12px;color:#7b8577;">Curated with care in India · {{ year }}</p>
      </div>
    </div>
  </body>
</html>
